services:
  # ─────────────────────────────────────────────
  # PostgreSQL + pgvector
  # ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vms_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: cctv_vms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ─────────────────────────────────────────────
  # MinIO (S3-compatible storage untuk rekaman)
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: vms_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data

  # ─────────────────────────────────────────────
  # MediaMTX (RTSP → WebRTC Proxy)
  # ─────────────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: vms_mediamtx
    restart: always
    ports:
      - "8554:8554"   # RTSP
      - "8889:8889"   # WebRTC (HTTP)
      - "8890:8890"   # WebRTC (UDP)
      - "9997:9997"   # REST API MediaMTX
    volumes:
      - ./media_server/mediamtx.yml:/mediamtx.yml

volumes:
  postgres_data:
  minio_data:
