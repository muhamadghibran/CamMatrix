###############################################################
# MediaMTX Configuration — CCTV VMS Platform
# BASE CONFIG — statis, jangan diedit oleh backend.
# Kamera (paths) ditulis terpisah oleh backend di bawah bagian paths:
###############################################################

# ── Network ────────────────────────────────────────────────
rtspAddress: :8554
rtspAuthMethods: [basic, digest]
webrtcAddress: :8889

hlsAddress: :8888
hlsAlwaysRemux: yes
hlsSegmentDuration: 2s
hlsPartDuration: 500ms

# ── API — hanya localhost, tidak expose ke publik ───────────
# N1: bind ke 127.0.0.1, bukan :9997 (all-interface)
api: yes
apiAddress: 127.0.0.1:9997

# ── Logging ────────────────────────────────────────────────
logLevel: info
logDestinations: [stdout]

# ── Auth — N2: hapus wildcard, pakai 2 role spesifik ───────
# Basic auth dipakai agar kompatibel dengan Larix Broadcaster (mobile streaming)
# Password diambil dari env /etc/mediamtx/mediamtx.env (mode 600)
authInternalUsers:
  - user: publisher
    pass: ${MTX_PUBLISHER_PASS}
    ips: [127.0.0.1/32]
    permissions:
      - action: publish
      - action: api

  - user: mobile_publisher
    pass: ${MTX_MOBILE_PUBLISHER_PASS}
    permissions:
      - action: publish
        path: ~^mobile_
      - action: publish
        path: ~^cam_

  # User publik (anonymous) khusus untuk menonton streaming di browser
  - user: any
    pass:
    permissions:
      - action: read
      - action: playback

# ── Paths ──────────────────────────────────────────────────
# Bagian paths di bawah ini akan di-generate dan diperbarui
# secara otomatis oleh backend setiap kali kamera ditambah/dihapus.
# Jangan edit manual di bawah baris ini.

paths:
  all_others:
