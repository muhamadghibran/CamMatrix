###############################################################
# MediaMTX Configuration — CCTV VMS Platform
# BASE CONFIG — statis, jangan diedit oleh backend.
# Kamera (paths) ditulis terpisah oleh backend di bawah bagian paths:
###############################################################

# ── Network ────────────────────────────────────────────────
rtspAddress: :8554
rtspAuthMethods: [basic, digest]
webrtcAddress: :8889

hlsAddress: :8888
hlsAlwaysRemux: yes
hlsSegmentDuration: 2s
hlsPartDuration: 500ms

# ── API — hanya localhost, tidak expose ke publik ───────────
api: yes
apiAddress: 127.0.0.1:9997

# ── Logging ────────────────────────────────────────────────
logLevel: info
logDestinations: [stdout]

# ── Auth ───────────────────────────────────────────────────
authInternalUsers:
  - user: publisher
    pass: ${MTX_PUBLISHER_PASS}
    ips: [127.0.0.1/32]
    permissions:
      - action: publish
      - action: api

  - user: mobile_publisher
    pass: ${MTX_MOBILE_PUBLISHER_PASS}
    permissions:
      - action: publish
        path: ~^mobile_
      - action: publish
        path: ~^cam_

  # Publik (anonymous) — menonton streaming + akses API dari localhost
  # API sudah aman karena apiAddress hanya 127.0.0.1:9997
  - user: any
    pass:
    permissions:
      - action: read
      - action: playback
      - action: api

# ── Paths ──────────────────────────────────────────────────
# Bagian paths di bawah ini akan di-generate dan diperbarui
# secara otomatis oleh backend setiap kali kamera ditambah/dihapus.
# all_others: berlaku untuk semua path yang tidak terdaftar spesifik.

paths:
  all_others:
    record: yes
    recordPath: /var/www/CamMatrix/recordings/%path/%Y-%m-%d_%H-%M-%S.mp4
    recordPartDuration: 1s
    recordSegmentDuration: 3600s
